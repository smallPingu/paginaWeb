<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrador · Clases de Dibujo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #666; flex-direction: column; gap: 1rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e8e0d0; border-top-color: #d48826; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Cargando panel de administración...</span>
  </div>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
